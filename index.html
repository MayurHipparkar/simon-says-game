<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="styleSheet" href="../simonSaysGame/css/simonSaysGame.css"
</head>
<body>
    <h1>Simon Says Game</h1>
    <h2>Press any key to star the game</h2>

    <h3  class="high-score">High Score : <span>0</span></h3>

    <div class="btn-container">
        <div class="line-one">
            <div class="btn blue" type="button" id="blue"></div>
             <div class="btn yellow" type="button" id="yellow"></div>
        </div>
        <div class="line-two">
             <div class="btn orange" type="button" id="orange"></div>
              <div class="btn red" type="button" id="red"></div>
        </div>
    </div>

    <script src="../simonSaysGame/js/simonSaysGame.js"></script>
</body>
</html>
